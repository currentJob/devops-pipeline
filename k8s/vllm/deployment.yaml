apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: devops-pipeline
  labels:
    app: vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      containers:
        - name: vllm
          image: ghcr.io/YOUR_ORG/devops-pipeline-vllm:latest
          imagePullPolicy: Always
          args:
            - "--model"
            - "$(VLLM_MODEL)"
            - "--port"
            - "8000"
            - "--enable-prefix-caching"
            - "--max-model-len"
            - "4096"
          ports:
            - containerPort: 8000
          env:
            - name: VLLM_MODEL
              valueFrom:
                configMapKeyRef:
                  name: pipeline-config
                  key: VLLM_MODEL
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: pipeline-secrets
                  key: HUGGING_FACE_HUB_TOKEN
                  optional: true
          resources:
            requests:
              cpu: "2"
              memory: "16Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: "24Gi"
              nvidia.com/gpu: "1"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 15
          volumeMounts:
            - name: model-cache
              mountPath: /root/.cache/huggingface
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: vllm-model-cache
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
