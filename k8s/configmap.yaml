apiVersion: v1
kind: ConfigMap
metadata:
  name: pipeline-config
  namespace: devops-pipeline
data:
  LOG_LEVEL: "INFO"
  WORKER_MODEL: "claude-sonnet-4-6"
  WORKER_MAX_TOKENS: "8192"
  WORKER_MAX_ITERATIONS: "10"
  WORKER_TIMEOUT_S: "120"
  WORKER_MAX_CONCURRENT: "3"
  WORKER_QUEUE_SIZE: "50"
  BOT_NOTIFY_URL: "http://bot:8765/notify"
  BOT_RESULT_URL: "http://bot:8765/worker-result"
  WORKER_URL: "http://worker:8766/run"
  WORKER_HEALTH_URL: "http://worker:8766/health"
  WORKER_TASKS_URL: "http://worker:8766/tasks"
  # vLLM — 활성화 시 Claude API 대신 사용
  VLLM_ENDPOINT: "http://vllm:8000"
  VLLM_MODEL: "Qwen/Qwen2.5-Coder-7B-Instruct"
