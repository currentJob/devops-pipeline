---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: devops-pipeline
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      external_labels:
        project: devops-pipeline
    scrape_configs:
      - job_name: vllm
        static_configs:
          - targets: ["vllm:8000"]
        metrics_path: /metrics
        scrape_interval: 30s
      - job_name: worker
        static_configs:
          - targets: ["worker:8766"]
        metrics_path: /metrics
        scrape_interval: 30s
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: devops-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v3.3.1
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=15d"
          ports:
            - containerPort: 9090
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: devops-pipeline
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
  type: ClusterIP
