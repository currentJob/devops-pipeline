networks:
  pipeline-net:
    driver: bridge

volumes:
  vllm-cache:
  prometheus-data:
  grafana-data:
  postgres-data:

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    env_file: .env
    restart: unless-stopped
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - ./logs:/app/logs
    networks:
      - pipeline-net
    depends_on:
      worker:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "python", "-c", "import app.config"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    command: ["python", "-m", "app.worker.server"]
    env_file: .env
    restart: unless-stopped
    expose:
      - "8766"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      # rw: /commit 이 로컬 git 커밋(.git 쓰기)을 수행. 원격 push 는 하지 않음.
      # 컨테이너 root FS 는 read_only 로 유지되고, 쓰기는 이 바인드 마운트로 한정.
      - ./:/workspace:rw
    networks:
      - pipeline-net
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8766/health', timeout=3)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── PostgreSQL (선택) ────────────────────────────────────────────────────────
  # 사용: docker compose --profile postgres up
  # .env 에서 DB_BACKEND=postgres 로 전환 시 워커가 이 DB(내부 네트워크)에 연결.
  # 미사용 시 워커는 기본 SQLite(./data/tasks.db) 사용.
  postgres:
    image: postgres:17-alpine
    profiles: ["postgres"]
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-tasks}
      - POSTGRES_USER=${POSTGRES_USER:-pipeline}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
    # 내부 네트워크 전용 — 호스트 노출 안 함. 로컬 디버깅 필요 시 아래 주석 해제.
    # ports:
    #   - "127.0.0.1:5432:5432"
    expose:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - pipeline-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pipeline} -d ${POSTGRES_DB:-tasks}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── vLLM (선택) ─────────────────────────────────────────────────────────────
  # 사용: docker compose --profile vllm up
  # GPU 없는 환경: --gpus 없이 CPU 추론 (느림)
  vllm:
    image: vllm/vllm-openai:latest
    profiles: ["vllm"]
    restart: unless-stopped
    command:
      - "--model"
      - "${VLLM_MODEL:-Qwen/Qwen2.5-Coder-7B-Instruct}"
      - "--port"
      - "8000"
      - "--max-model-len"
      - "${VLLM_MAX_MODEL_LEN:-4096}"
      - "--gpu-memory-utilization"
      - "${VLLM_GPU_MEMORY_UTILIZATION:-0.7}"
      # 에이전트 도구 호출(tool calling) 활성화 — Qwen2.5 계열은 hermes 파서
      - "--enable-auto-tool-choice"
      - "--tool-call-parser"
      - "${VLLM_TOOL_PARSER:-hermes}"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - vllm-cache:/root/.cache/huggingface
    networks:
      - pipeline-net
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── 모니터링 스택 (선택) ──────────────────────────────────────────────────────
  # 사용: docker compose --profile monitoring up
  prometheus:
    image: prom/prometheus:v3.3.1
    profiles: ["monitoring"]
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - pipeline-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:11.6.1
    profiles: ["monitoring"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - pipeline-net
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
