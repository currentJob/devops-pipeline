networks:
  pipeline-net:
    driver: bridge

volumes:
  vllm-cache:
  prometheus-data:
  grafana-data:

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    env_file: .env
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - ./logs:/app/logs
    networks:
      - pipeline-net
    depends_on:
      worker:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "python", "-c", "import app.config"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    command: ["python", "-m", "app.worker.server"]
    env_file: .env
    expose:
      - "8766"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./:/workspace:ro
      - ./prompts/output:/workspace/prompts/output:rw
    networks:
      - pipeline-net
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8766/health', timeout=3)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── vLLM (선택) ─────────────────────────────────────────────────────────────
  # 사용: docker compose --profile vllm up
  # GPU 없는 환경: --gpus 없이 CPU 추론 (느림)
  vllm:
    image: vllm/vllm-openai:latest
    profiles: ["vllm"]
    command:
      - "--model"
      - "${VLLM_MODEL:-Qwen/Qwen2.5-Coder-7B-Instruct}"
      - "--port"
      - "8000"
      - "--max-model-len"
      - "${VLLM_MAX_MODEL_LEN:-4096}"
      - "--gpu-memory-utilization"
      - "${VLLM_GPU_MEMORY_UTILIZATION:-0.7}"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - vllm-cache:/root/.cache/huggingface
    networks:
      - pipeline-net
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── 모니터링 스택 (선택) ──────────────────────────────────────────────────────
  # 사용: docker compose --profile monitoring up
  prometheus:
    image: prom/prometheus:v3.3.1
    profiles: ["monitoring"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - pipeline-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:11.6.1
    profiles: ["monitoring"]
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - pipeline-net
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
