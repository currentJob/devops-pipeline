global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: devops-pipeline

scrape_configs:
  # vLLM OpenAI-compatible server metrics
  - job_name: vllm
    static_configs:
      - targets: ["vllm:8000"]
    metrics_path: /metrics
    scrape_interval: 30s

  # Worker service — /metrics 활성 (app/worker/metrics.py, server.py 가 노출)
  - job_name: worker
    static_configs:
      - targets: ["worker:8766"]
    metrics_path: /metrics
    scrape_interval: 30s

  # Qdrant 벡터 DB metrics
  - job_name: qdrant
    static_configs:
      - targets: ["qdrant:6333"]
    metrics_path: /metrics
    scrape_interval: 30s

  # 컨테이너 리소스 (cAdvisor) — CPU/메모리/네트워크 per-container
  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
    scrape_interval: 30s

  # 호스트 시스템 (node-exporter)
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]
    scrape_interval: 30s

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
