apiVersion: 1

# 알림 전송 채널 + 기본 정책.
# Telegram contact point 는 봇 토큰/chat_id 를 재사용한다(docker-compose grafana env 주입).
# 미설정(빈 값) 시 전송만 실패하고 Grafana·대시보드는 정상 동작한다.

contactPoints:
  - orgId: 1
    name: telegram
    receivers:
      - uid: telegram-bot
        type: telegram
        settings:
          # 따옴표 필수 — Grafana 가 YAML 파싱 전 raw 치환하므로, 없으면 chatid 가
          # 숫자로 파싱돼 거부됨(chatid/bottoken 은 string 타입). 토큰의 ':' 도 보호.
          bottoken: "$TELEGRAM_TOKEN"
          chatid: "$TELEGRAM_CHAT_ID"
        disableResolveMessage: false

policies:
  - orgId: 1
    receiver: telegram
    group_by: ["grafana_folder", "alertname"]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
