apiVersion: 1

# 알림 전송 채널 + 기본 정책.
# Telegram contact point 는 봇 토큰/chat_id 를 재사용한다(docker-compose grafana env 주입).
# 미설정(빈 값) 시 전송만 실패하고 Grafana·대시보드는 정상 동작한다.

contactPoints:
  - orgId: 1
    name: telegram
    receivers:
      - uid: telegram-bot
        type: telegram
        settings:
          # chatid/bottoken 은 string 타입. Grafana 가 $VAR 를 치환하면 chatid 가 숫자로
          # 재해석돼 거부되므로(!!str)로 타입을 강제하고 따옴표로 토큰의 ':' 도 보호한다.
          bottoken: "$TELEGRAM_TOKEN"
          chatid: !!str "$TELEGRAM_CHAT_ID"
        disableResolveMessage: false

policies:
  - orgId: 1
    receiver: telegram
    group_by: ["grafana_folder", "alertname"]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
