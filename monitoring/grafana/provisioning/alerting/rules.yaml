apiVersion: 1

# 알림 룰 — Prometheus 쿼리(A) + classic_condition(C) 임계 평가.
# folder 는 프로비저닝이 생성한다. 전송은 기본 정책(contactpoints.yaml)에 따라 Telegram.

groups:
  - orgId: 1
    name: devops-pipeline
    folder: Alerts
    interval: 1m
    rules:
      - uid: dp-worker-failures
        title: 워커 작업 실패 발생
        condition: C
        for: 0m
        noDataState: OK
        execErrState: Alerting
        labels:
          severity: warning
        annotations:
          summary: 최근 10분 내 워커 작업 실패가 발생했습니다.
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              datasource:
                type: prometheus
                uid: prometheus
              expr: sum(increase(worker_tasks_total{status="failed"}[10m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: classic_conditions
              datasource:
                type: __expr__
                uid: __expr__
              conditions:
                - type: query
                  evaluator:
                    type: gt
                    params: [0]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                    params: []

      - uid: dp-queue-backlog
        title: 워커 대기 큐 적체
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Alerting
        labels:
          severity: warning
        annotations:
          summary: 워커 대기 큐가 5분 이상 20건을 초과했습니다.
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              datasource:
                type: prometheus
                uid: prometheus
              expr: max(worker_queue_size)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: classic_conditions
              datasource:
                type: __expr__
                uid: __expr__
              conditions:
                - type: query
                  evaluator:
                    type: gt
                    params: [20]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                    params: []

      - uid: dp-host-cpu-high
        title: 호스트 CPU 사용률 높음
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Alerting
        labels:
          severity: warning
        annotations:
          summary: 호스트 CPU 사용률이 5분 이상 90%를 초과했습니다.
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              datasource:
                type: prometheus
                uid: prometheus
              expr: 100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: classic_conditions
              datasource:
                type: __expr__
                uid: __expr__
              conditions:
                - type: query
                  evaluator:
                    type: gt
                    params: [90]
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                    params: []
