name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 동시 실행 제한 — 같은 브랜치의 새 push 가 들어오면 이전 실행 취소
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pytest
        run: uv run pytest tests/ -v

      - name: pip-audit
        run: uv run pip-audit --strict

  container-build-scan:
    runs-on: ubuntu-latest
    needs: lint-test
    permissions:
      contents: read
      security-events: write  # SARIF 업로드용
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          docker build \
            --target runtime \
            -t devops-pipeline:ci-${{ github.sha }} \
            .

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          image: devops-pipeline:ci-${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom.cdx.json
          upload-artifact: false

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: devops-pipeline:ci-${{ github.sha }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: |
            sbom.cdx.json
            sbom.spdx.json
          retention-days: 30

      # 처음 도입 단계: CRITICAL 만 빌드 실패. HIGH 는 보고만.
      # 정착 후 severity: HIGH,CRITICAL 로 강화 가능.
      - name: Trivy container scan (CRITICAL fails build)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: devops-pipeline:ci-${{ github.sha }}
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true
          format: table

      - name: Trivy container scan (HIGH, 보고만)
        if: always()
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: devops-pipeline:ci-${{ github.sha }}
          severity: HIGH
          exit-code: 0
          ignore-unfixed: true
          format: sarif
          output: trivy-high.sarif

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-high.sarif
