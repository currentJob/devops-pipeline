name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pytest
        run: uv run pytest tests/ -v

      - name: pip-audit
        run: uv run pip-audit --strict

  smoke:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # compose 의 env_file 이 요구하는 .env 를 가장 먼저 생성 — 이후 모든 docker compose
      # 명령(부팅·teardown)이 .env 를 찾도록. (없으면 teardown 이 실패해 진짜 원인을 가림)
      - name: Prepare .env (CI dummy)
        run: printf 'TELEGRAM_TOKEN=ci-dummy\nTELEGRAM_CHAT_ID=0\n' > .env

      # 1) dev 이미지 안에서 테스트 스위트 실행 — 봇 /test 경로(컨테이너 내 pytest 도구) 검증
      - name: Build dev worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime-dev
          push: false
          load: true
          tags: devops-pipeline:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run test suite inside dev image
        # appuser(봇과 동일 권한)로 실행해 콘솔 스크립트 shebang·권한 경로를 그대로 검증.
        # -p no:cacheprovider: .pytest_cache 미생성 (마운트 쓰기 회피)
        run: |
          docker run --rm -v "${{ github.workspace }}:/workspace" -w /workspace \
            devops-pipeline:dev pytest tests/ -q -p no:cacheprovider

      # 2) 컨테이너 부팅 + 자가점검 — 기동/Qdrant 연결/git ownership 등 통합 결함 검출
      - name: Boot worker + qdrant
        run: docker compose up -d --build qdrant worker

      - name: Wait for worker health
        run: |
          for i in $(seq 1 30); do
            if docker compose exec -T worker python -c "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8766/health',timeout=2).status==200 else 1)" 2>/dev/null; then
              echo "worker healthy"; exit 0
            fi
            sleep 2
          done
          echo "::error::worker 가 기동되지 않음"; docker compose logs worker; exit 1

      - name: Self-check (db/git/qdrant 필수 통과)
        run: docker compose exec -T worker python /workspace/scripts/smoke_selfcheck.py

      - name: Teardown
        if: always()
        run: docker compose down -v

  container-build-scan:
    runs-on: ubuntu-latest
    needs: lint-test
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build app image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: false
          tags: devops-pipeline:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          image: devops-pipeline:ci-${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom.cdx.json
          upload-artifact: false

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: devops-pipeline:ci-${{ github.sha }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: |
            sbom.cdx.json
            sbom.spdx.json
          retention-days: 30

      - name: Trivy scan — CRITICAL (빌드 실패)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: devops-pipeline:ci-${{ github.sha }}
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true
          format: table

      - name: Trivy scan — HIGH (보고만)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: devops-pipeline:ci-${{ github.sha }}
          severity: HIGH
          exit-code: 0
          ignore-unfixed: true
          format: sarif
          output: trivy-high.sarif

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-high.sarif

  registry-push:
    runs-on: ubuntu-latest
    needs: container-build-scan
    if: github.event_name == 'push'   # PR 에서는 푸시 안 함
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  vllm-build:
    runs-on: ubuntu-latest
    needs: lint-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract vLLM image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-vllm
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push vLLM image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.vllm
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
